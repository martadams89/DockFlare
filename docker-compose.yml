version: '3.8'
services:
  cloudflare-tunnel-manager:
    build: .
    container_name: cloudflare-tunnel-manager
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/app/data
    networks:
      - cloudflare-net
    environment:
      - STATE_FILE_PATH=/app/data/state.json

networks:
  cloudflare-net:
    driver: bridge
    name: cloudflare-net